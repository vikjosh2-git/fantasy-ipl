{% extends "base.html" %}
{% block title %}Register — F&F CricFans League{% endblock %}
{% block content %}
<div style="display:flex; justify-content:center; margin-top:60px;">
  <div class="card" style="width:380px;">
    <h2 style="color:#f5a623; text-align:center; margin-bottom:24px;">🏏 Create Account</h2>
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="text" name="team_name" placeholder="Your Team Name" required />
      <input type="password" name="password" placeholder="Password" required />
      <button class="btn btn-primary" style="width:100%; padding:12px; font-size:16px;">Create Account</button>
    </form>
    <p style="color:#aaa; text-align:center; margin-top:16px; font-size:14px;">
      Already have an account? <a href="/login" style="color:#f5a623;">Login</a>
    </p>
  </div>
</div>
{% endblock %}
