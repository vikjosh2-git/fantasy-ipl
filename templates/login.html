{% extends "base.html" %}
{% block title %}Login — Friends & Family Cricket Fantasy League{% endblock %}
{% block content %}
<div style="display:flex; justify-content:center; margin-top:60px;">
  <div class="card" style="width:380px;">
    <h2 style="color:#f5a623; text-align:center; margin-bottom:24px;">🏏 Friends & Family Cricket Fantasy League</h2>
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button class="btn btn-primary" style="width:100%; padding:12px; font-size:16px;">Login</button>
    </form>
    <p style="color:#aaa; text-align:center; margin-top:16px; font-size:14px;">
      Don't have an account? <a href="/register" style="color:#f5a623;">Register</a>
    </p>
  </div>
</div>
{% endblock %}
